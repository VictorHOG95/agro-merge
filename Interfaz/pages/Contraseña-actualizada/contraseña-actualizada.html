<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Contraseña actualizada - Agro-Merge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<link href="../../eCommerceAssets/styles/styles.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div class="styles-layout">
    <main class="styles-panel">
      <header class="styles-panel__header">
        <div class="logo">
          <img src="../../eCommerceAssets/img/logo.png" alt="Agro-Merge" class="logo__img" />
          <span class="logo__text">Agro-Merge</span>
        </div>
      </header>

      <section class="styles-panel__body">
        <div class="big-illustration">
          <span style="color: #16a34a; font-weight: 700;">✔</span>
        </div>

        <h1 class="styles-title" style="text-align: center; margin-top: 0;">
          Contraseña actualizada
        </h1>
        <p
          class="styles-subtitle"
          style="text-align: center; margin-top: 8px; margin-bottom: 24px;"
        >
          Tu nueva contraseña ha sido guardada. Ya puedes acceder a tu cuenta.
        </p>

        <button
          class="btn btn--primary"
          style="width: 100%; max-width: 260px; margin: 0 auto 18px; display: block;"
        >
          Ir al login
        </button>
      </section>

      <footer class="styles-panel__footer">
        <span>Todos los derechos reservados © Agromerge</span>
        <span>Política de Privacidad</span>
      </footer>
    </main>

    <aside class="styles-image"></aside>
  </div>
</body>
</html>
