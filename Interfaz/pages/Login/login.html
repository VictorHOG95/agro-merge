<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Inicio de sesión - Agro-Merge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

	 <link href="../../eCommerceAssets/styles/styles.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div class="styles-layout">
    <main class="styles-panel">
      <header class="styles-panel__header">
        <div class="logo">
          <img src="../../eCommerceAssets/img/logo.png" alt="Agro-Merge" class="logo__img" />
          <span class="logo__text">Agro-Merge</span>
        </div>
      </header>

      <section class="styles-panel__body">
        <h1 class="styles-title">Inicio de sesión</h1>
        <p class="styles-subtitle">Inicia sesión y empieza a comprar.</p>

       <form class="form" action="http://localhost:3000/login" method="POST">
          <div class="form-group">
            <label for="email">Correo</label>
            <input id="email" type="email" name="correo_usuario" placeholder="user@gmail.com" required />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input
              id="password"
              type="password"
              name="clave_usuario"
              placeholder="Escribe tu contraseña"
              required
            />
          </div>

          <div class="form-row">
            <label class="checkbox">
              <input type="checkbox" />
              <span class="checkbox__mark"></span>
              <span>Recuérdame</span>
            </label>

            <a href="#" class="link">¿Olvidaste tu contraseña?</a>
          </div>

          <button class="btn btn--primary" type="submit">Login</button>
            
          <p class="styles-footer-text">
            ¿No tienes una cuenta?
            <a href="../Registro/registro.html" class="link">Crear cuenta</a>
          </p>
        </form>
      </section>

      <footer class="styles-panel__footer">
        <span>Todos los derechos reservados © Agromerge</span>
        <span>Política de Privacidad</span>
      </footer>
    </main>

    <aside class="styles-image"></aside>
  </div>
</body>
</html>
