<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Agro-Merge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="../../eCommerceAssets/styles/styles.css" rel="stylesheet" type="text/css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f3f4f6; }
        
        .checkout-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .checkout-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
        }
        .checkout-header h1 { margin: 0; color: #111827; font-size: 28px; }
        .checkout-steps { display: flex; gap: 20px; }
        .step { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #6b7280; }
        .step.activo { color: #3f6212; font-weight: 600; }
        .step i { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; background: #e5e7eb; border-radius: 50%; font-size: 12px; }
        .step.activo i { background: #3f6212; color: white; }

        .checkout-content { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        
        /* Formulario */
        .checkout-form { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-section { margin-bottom: 30px; }
        .form-section:last-child { margin-bottom: 0; }
        .form-section h2 { font-size: 18px; margin-bottom: 16px; color: #111827; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        /* Resumen */
        .checkout-resumen { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); height: fit-content; }
        .resumen-items { margin-bottom: 20px; max-height: 300px; overflow-y: auto; }
        .resumen-item { display: flex; gap: 10px; margin-bottom: 12px; font-size: 13px; padding-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
        .resumen-item:last-child { border-bottom: none; }
        .resumen-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .resumen-info { flex: 1; }
        .resumen-info p { margin: 0; color: #6b7280; }
        .resumen-info strong { color: #111827; }
        
        .resumen-total { padding: 12px 0; margin: 12px 0; border-top: 2px solid #e5e7eb; border-bottom: 2px solid #e5e7eb; }
        .resumen-fila { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .resumen-fila.total { font-weight: 600; font-size: 16px; color: #111827; }
        
        .btn-comprar { width: 100%; padding: 12px; background: #3f6212; color: white; border: none; border-radius: 999px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: background 0.3s; }
        .btn-comprar:hover { background: #2d4709; }
        .btn-comprar:disabled { background: #9ca3af; cursor: not-allowed; }

        .mensaje-exito { display: none; padding: 16px; background: #dcfce7; border: 1px solid #86efac; border-radius: 8px; color: #166534; margin-bottom: 20px; }
        .mensaje-error { display: none; padding: 16px; background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; color: #991b1b; margin-bottom: 20px; }

        @media (max-width: 768px) {
            .checkout-content { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .checkout-resumen { order: -1; }
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-header">
            <h1>Finalizar la compra</h1>
            <div class="checkout-steps">
                <div class="step activo">
                    <i>✓</i> Carrito
                </div>
                <div class="step activo">
                    <i>2</i> Envío
                </div>
                <div class="step">
                    <i>3</i> Pago
                </div>
            </div>
        </div>

        <div class="checkout-content">
            <form id="checkout-form" class="checkout-form" autocomplete="off">
                <div class="mensaje-exito" id="msg-exito">
                    <strong>¡Éxito!</strong> Tu pedido ha sido registrado. Nos pondremos en contacto pronto.
                </div>
                <div class="mensaje-error" id="msg-error">
                    <strong>Error</strong> Por favor, completa todos los campos.
                </div>

                <div class="form-section">
                    <h2>Información de Envío</h2>
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" name="nombre"placeholder="Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" name="email" placeholder="juan@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" name="telefono" placeholder="+57 300 000 0000" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Departamento</label>
                            <select name="departamento" required>
                                <option value="">Selecciona un departamento</option>
                                <option value="cundinamarca">Cundinamarca</option>
                                <option value="boyaca">Boyacá</option>
                                <option value="santander">Santander</option>
                                <option value="valle">Valle del Cauca</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Ciudad</label>
                            <input type="text" name="ciudad" placeholder="Bogotá" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" name="direccion" placeholder="Calle 123 #45-67" required>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Método de Pago</h2>
                    <div class="form-group">
                        <label>Selecciona un método de pago</label>
                        <select name="metodo_pago" required>
                            <option value="">Elegir método</option>
                            <option value="tarjeta">Tarjeta de Crédito/Débito</option>
                            <option value="transferencia">Transferencia Bancaria</option>
                            <option value="efectivo">Contraentrega (Efectivo)</option>
                            <option value="pse">PSE</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-group">
                        <label style="display: flex; gap: 8px; font-weight: normal;">
                            <input type="checkbox" name="terminos" required>
                            Acepto los términos y condiciones de compra
                        </label>
                    </div>
                </div>
            </form>

            <aside class="checkout-resumen">
                <h3 style="margin-top: 0;">Resumen del Pedido</h3>
                <div class="resumen-items" id="resumen-items"></div>
                
                <div class="resumen-total">
                    <div class="resumen-fila">
                        <span>Subtotal</span>
                        <span id="resumen-subtotal">COP$ 0</span>
                    </div>
                    <div class="resumen-fila">
                        <span>Envío</span>
                        <span id="resumen-envio">COP$ 7.900</span>
                    </div>
                    <div class="resumen-fila total">
                        <span>Total a pagar</span>
                        <span id="resumen-total">COP$ 0</span>
                    </div>
                </div>

                <button type="submit" form="checkout-form" class="btn-comprar" id="btn-comprar">
                    Confirmar Pedido
                </button>
                <a href="/pages/Productos/Productos.html" style="display: block; text-align: center; color: #3f6212; text-decoration: none; margin-top: 12px;">
                    ← Volver al Mercado
                </a>
            </aside>
        </div>
    </div>

    <script>
        // Cargar datos del pedido desde localStorage
        function cargarPedido() {
            const pedidoData = localStorage.getItem('pedido_actual');
            if (!pedidoData) {
                window.location.href = '../Productos/Productos.html';
                return;
            }

            const pedido = JSON.parse(pedidoData);
            
            // Llenar resumen
            const resumenItems = document.getElementById('resumen-items');
            resumenItems.innerHTML = pedido.items.map(item => `
                <div class="resumen-item">
                    <img src="${item.imagen}" alt="${item.nombre}">
                    <div class="resumen-info">
                        <p><strong>${item.nombre}</strong></p>
                        <p>Cantidad: ${item.cantidad}</p>
                        <p>COP$ ${formatearPrecio(item.precio * item.cantidad)}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('resumen-subtotal').textContent = 'COP$ ' + formatearPrecio(pedido.subtotal);
            document.getElementById('resumen-envio').textContent = 'COP$ ' + formatearPrecio(pedido.envio);
            document.getElementById('resumen-total').textContent = 'COP$ ' + formatearPrecio(pedido.total);
        }

        function formatearPrecio(precio) {
            return precio.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // Manejar envío del formulario
        document.getElementById('checkout-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const pedidoData = JSON.parse(localStorage.getItem('pedido_actual'));
            if (!pedidoData) return;

            const formData = new FormData(this);
            const emailSesion = localStorage.getItem('usuarioEmail') || formData.get('email');
            const pedido = {
                nombre: formData.get('nombre'),
                email: emailSesion,           // ← cambia formData.get('email') por emailSesion
                usuarioEmail: emailSesion,  
                telefono: formData.get('telefono'),
                departamento: formData.get('departamento'),
                ciudad: formData.get('ciudad'),
                direccion: formData.get('direccion'),
                metodo_pago: formData.get('metodo_pago'),
                items: pedidoData.items,
                total: pedidoData.total,
                fecha: new Date().toISOString()
            };

            // Enviar al backend
            fetch('/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(pedido)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('msg-exito').style.display = 'block';
                    document.getElementById('msg-error').style.display = 'none';
                    localStorage.removeItem('pedido_actual');
                    localStorage.removeItem('carrito');
                    setTimeout(() => {
                        window.location.href = '/pages/Productos/Productos.html';
                    }, 3000);
                } else {
                    document.getElementById('msg-error').innerHTML = `<strong>Error</strong> ${data.error || 'No se pudo procesar el pago.'}`;
                    document.getElementById('msg-error').style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('msg-error').innerHTML = '<strong>Error</strong> No se pudo conectar con el servidor.';
                document.getElementById('msg-error').style.display = 'block';
            });
        });

        // Cargar pedido al iniciar
        window.addEventListener('DOMContentLoaded', function() {
            // ✅ VALIDACION: Verificar si usuario está registrado
            const sesionIniciada = localStorage.getItem('sesionIniciada');
            
            if (sesionIniciada !== 'true') {
                alert('❌ Debes iniciar sesión para acceder a la página de compra.');
                window.location.href = '/pages/Login/login.html';
                return;
            }
            
            // Usuario está registrado, cargar el pedido
            cargarPedido();
        });
    </script>
</body>
</html>
