<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Completa tu perfil - Paso 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<link href="../../eCommerceAssets/styles/styles.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div class="styles-layout">
    <main class="styles-panel">
      <header class="styles-panel__header">
        <div class="logo">
          <img src="../../eCommerceAssets/img/logo.png" alt="Agro-Merge" class="logo__img" />
          <span class="logo__text">Agro-Merge</span>
        </div>
      </header>

      <section class="styles-panel__body">
        <h1 class="styles-title">Agrega tus productos</h1>
        <p class="styles-subtitle">
          Añade todos tus productos con sus detalles e imagen.
        </p>

        <!-- Sección de productos agregados -->
        <div id="productsContainer" class="products-grid">
          <!-- Los productos se agregarán aquí dinámicamente -->
        </div>

        <!-- Botón para agregar productos -->
        <button
          class="btn btn--secondary"
          type="button"
          onclick="openModal()"
          style="width: 100%; max-width: 260px; margin: 24px 0 0;"
        >
          + Agregar Producto
        </button>

        <button
          class="btn btn--primary"
          style="width: 100%; max-width: 260px; margin: 16px 0 0;"
          onclick="goToStep2()"
        >
          Continuar
        </button>
      </section>

      <footer class="styles-panel__footer">
        <span>Todos los derechos reservados © Agromerge</span>
        <span>Política de Privacidad</span>
      </footer>
    </main>

    <aside class="styles-image"></aside>
  </div>

  <!-- Modal -->
  <div id="productModal" class="modal" style="display: none;">
    <div class="modal__content modal__content--large">
      <div class="modal__header">
        <h2>Agregar Producto</h2>
        <button class="modal__close" onclick="closeModal()">&times;</button>
      </div>

      <form class="form" onsubmit="addProduct(event)">
        <div class="form-group">
          <label>Nombre del producto *</label>
          <input type="text" id="productName" placeholder="Ej: Maíz fresco" required />
        </div>

        <div class="form-group">
          <label>Descripción</label>
          <textarea id="productDescription" placeholder="Describe tu producto (origen, características, etc.)" rows="3"></textarea>
        </div>

        <div class="form-row-2">
          <div class="form-group">
            <label>Precio (COP) *</label>
            <input type="number" id="productPrice" placeholder="Ej: 25000" min="0" step="100" required />
          </div>
          <div class="form-group">
            <label>Cantidad disponible *</label>
            <input type="number" id="productQuantity" placeholder="Ej: 50" min="0" required />
          </div>
        </div>

        <div class="form-group">
          <label>Unidad de medida *</label>
          <select id="productUnit" required>
            <option value="">Selecciona una unidad</option>
            <option value="kg">Kilogramos (kg)</option>
            <option value="g">Gramos (g)</option>
            <option value="lb">Libras (lb)</option>
            <option value="unidad">Unidad</option>
            <option value="docena">Docena</option>
            <option value="bulto">Bulto</option>
            <option value="caja">Caja</option>
          </select>
        </div>

        <div class="form-group">
          <label>Imagen del producto *</label>
          <div class="file-upload">
            <input type="file" id="productImage" accept="image/*" required />
            <span id="fileName">Selecciona una imagen</span>
            <div id="imagePreview" class="image-preview" style="display: none;">
              <img id="previewImg" src="" alt="Preview" />
            </div>
          </div>
        </div>

        <div class="form-row-buttons">
          <button type="button" class="btn btn--secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn btn--primary">Agregar Producto</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const sellerName = (localStorage.getItem('nombreUsuario') || 'vendedor').trim();
    const productsStorageKey = `productos_vendedor_${sellerName.toLowerCase()}`;
    let products = [];
    let productIdCounter = 0;

    function loadSellerProducts() {
      const savedProducts = localStorage.getItem(productsStorageKey);
      products = savedProducts ? JSON.parse(savedProducts) : [];
      productIdCounter = products.length
        ? Math.max(...products.map((p) => p.id || 0)) + 1
        : 0;
    }

    function persistSellerProducts() {
      localStorage.setItem(productsStorageKey, JSON.stringify(products));
    }

    // Escuchar cambios en el input de archivo
    document.addEventListener('DOMContentLoaded', function() {
      const modal = document.getElementById('productModal');
      const fileInput = document.getElementById('productImage');
      const fileUpload = document.querySelector('.file-upload');

      // Hacer clickeable la zona de carga de archivo
      if (fileUpload) {
        fileUpload.addEventListener('click', function() {
          fileInput.click();
        });
      }

      // Cerrar modal al hacer clic fuera
      modal.addEventListener('click', function(event) {
        if (event.target === modal) {
          closeModal();
        }
      });

      // Actualizar preview de imagen
      fileInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        const fileName = document.getElementById('fileName');
        const preview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');

        if (file) {
          fileName.textContent = file.name;
          const reader = new FileReader();
          reader.onload = function(e) {
            previewImg.src = e.target.result;
            preview.style.display = 'block';
          };
          reader.readAsDataURL(file);
        } else {
          fileName.textContent = 'Selecciona una imagen';
          preview.style.display = 'none';
        }
      });
    });

    function openModal() {
      document.getElementById('productModal').style.display = 'flex';
      document.getElementById('productName').focus();
      // Limpiar el formulario
      document.getElementById('productName').value = '';
      document.getElementById('productDescription').value = '';
      document.getElementById('productPrice').value = '';
      document.getElementById('productQuantity').value = '';
      document.getElementById('productUnit').value = '';
      document.getElementById('productImage').value = '';
      document.getElementById('fileName').textContent = 'Selecciona una imagen';
      document.getElementById('imagePreview').style.display = 'none';
    }

    function closeModal() {
      document.getElementById('productModal').style.display = 'none';
    }

    function addProduct(event) {
      event.preventDefault();

      const name = document.getElementById('productName').value.trim();
      const description = document.getElementById('productDescription').value.trim();
      const price = parseFloat(document.getElementById('productPrice').value);
      const quantity = parseInt(document.getElementById('productQuantity').value);
      const unit = document.getElementById('productUnit').value;
      const imageInput = document.getElementById('productImage');

      if (!imageInput.files[0]) {
        alert('Por favor selecciona una imagen');
        return;
      }

      if (name && price >= 0 && quantity >= 0 && unit) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const product = {
            id: productIdCounter++,
            name: name,
            description: description,
            price: price,
            quantity: quantity,
            unit: unit,
            image: e.target.result
          };

          products.push(product);
          persistSellerProducts();
          renderProducts();
          closeModal();
        };
        reader.readAsDataURL(imageInput.files[0]);
      } else {
        alert('Por favor completa todos los campos obligatorios correctamente');
      }
    }

    function deleteProduct(id) {
      if (confirm('¿Estás seguro de que deseas eliminar este producto?')) {
        products = products.filter(p => p.id !== id);
        persistSellerProducts();
        renderProducts();
      }
    }

    function renderProducts() {
      const container = document.getElementById('productsContainer');
      
      if (products.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #9ca3af; padding: 24px;">Aún no has agregado productos</p>';
        return;
      }

      container.innerHTML = products.map(product => `
        <div class="product-card">
          <div class="product-card__image">
            <img src="${product.image}" alt="${product.name}" />
          </div>
          <div class="product-card__content">
            <h3 class="product-card__name">${product.name}</h3>
            ${product.description ? `<p class="product-card__description">${product.description}</p>` : ''}
            <div class="product-card__info">
              <span class="product-card__price">$${product.price.toLocaleString('es-CO')}</span>
              <span class="product-card__quantity">${product.quantity} ${product.unit}</span>
            </div>
          </div>
          <button 
            class="product-card__delete" 
            onclick="deleteProduct(${product.id})"
            title="Eliminar producto"
          >
            ✕
          </button>
        </div>
      `).join('');
    }

    function goToStep2() {
      if (products.length > 0) {
        // Guardar por compatibilidad en sessionStorage para otras vistas
        sessionStorage.setItem('products', JSON.stringify(products));
        persistSellerProducts();
        window.location.href = '/pages/Perfil-vendedor/vendedor-dashboard.html';
      } else {
        alert('Por favor agrega al menos un producto');
      }
    }

    // Inicializar la vista de productos
    loadSellerProducts();
    renderProducts();
  </script>
</body>
</html>
